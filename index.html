<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الخريطة السياحية الشاملة - طرابلس</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="header-title">
        <h1><i class="fas fa-map-marked-alt" style="margin-left: 10px;"></i> خريطة طرابلس السياحية الشاملة</h1>
        <p>معالم، فنادق، مطاعم، مقاهي، وآثار</p>
    </div>
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="ابحث عن أي موقع...">
    </div>
</header>

<div class="main-container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-chart-line" style="margin-left: 8px;"></i>المؤشرات</h3>
            <button class="close-sidebar" id="closeSidebar"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="stats-grid" id="statsContainer"></div>

        <div class="main-filter">
            <div class="filter-title"><i class="fas fa-layer-group"></i> الفئات الرئيسية</div>
            <div class="main-filter-buttons" id="mainFilterButtons">
                <button class="main-filter-btn active" data-main="all"><i class="fas fa-globe"></i> الكل</button>
                <button class="main-filter-btn" data-main="tourism"><i class="fas fa-landmark"></i> معالم</button>
                <button class="main-filter-btn" data-main="historic"><i class="fas fa-archway"></i> آثار</button>
                <button class="main-filter-btn" data-main="hotel"><i class="fas fa-hotel"></i> فنادق</button>
                <button class="main-filter-btn" data-main="apartment"><i class="fas fa-building"></i> شقق</button>
                <button class="main-filter-btn" data-main="cafe"><i class="fas fa-mug-hot"></i> مقاهي</button>
                <button class="main-filter-btn" data-main="restaurant"><i class="fas fa-utensils"></i> مطاعم</button>
            </div>
        </div>

        <div class="filter-section" id="subFilterSection" style="display: none;">
            <div class="filter-title"><i class="fas fa-filter"></i> <span id="subFilterTitle">تصفية إضافية</span></div>
            <div class="filter-buttons" id="subFilterButtons"></div>
        </div>

        <div class="sites-list" id="sitesList"></div>
    </div>

    <div class="map-container">
        <div id="map"></div>
    </div>

    <button class="toggle-sidebar" id="toggleSidebar">
        <i class="fas fa-chevron-right"></i>
    </button>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Main JS -->
<script src="js/main.js"></script>
</body>
</html>
